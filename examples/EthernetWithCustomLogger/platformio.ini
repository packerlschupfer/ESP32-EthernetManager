[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_ldf_mode = deep+
build_flags =
    -DUSE_CUSTOM_LOGGER
lib_deps =
    symlink://../..
    https://github.com/packerlschupfer/ESP32-LibraryCommon.git
    https://github.com/packerlschupfer/ESP32-MutexGuard.git
    https://github.com/packerlschupfer/ESP32-Logger.git
