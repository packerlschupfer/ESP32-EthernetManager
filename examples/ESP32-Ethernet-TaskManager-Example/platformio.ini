[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_ldf_mode = deep+
build_flags =
    -std=gnu++17
    -DUSE_CUSTOM_LOGGER
    -DCONFIG_ETH_ENABLED=1
    -DCONFIG_WIFI_ENABLED=0
    -DCONFIG_MDNS_DISABLE=1
    ; MutexGuard's logging header pulls in LogInterface.h (from ESP32-Logger)
    ; under USE_CUSTOM_LOGGER but does not declare Logger as a dependency, so
    ; expose Logger's headers on the global include path.
    -I.pio/libdeps/esp32dev/ESP32-Logger/src
    -DDEVICE_HOSTNAME=\"esp32-ethernet-device\"
    -DETH_PHY_MDC_PIN=23
    -DETH_PHY_MDIO_PIN=18
    -DETH_PHY_ADDR=0
    -DETH_PHY_POWER_PIN=-1
    -DSTATUS_LED_PIN=2
build_unflags =
    -std=gnu++11
lib_deps =
    symlink://../..
    https://github.com/packerlschupfer/ESP32-LibraryCommon.git
    https://github.com/packerlschupfer/ESP32-MutexGuard.git
    https://github.com/packerlschupfer/ESP32-Logger.git
    https://github.com/packerlschupfer/ESP32-SemaphoreGuard.git
    https://github.com/packerlschupfer/ESP32-Watchdog.git
    https://github.com/packerlschupfer/ESP32-TaskManager.git
